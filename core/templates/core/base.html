<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yapper - Sua Rede Social</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    nav {
      margin-bottom: 20px;
    }
    nav a {
      text-decoration: none;
      color: #0366d6;
      margin-right: 15px;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    hr {
      border: none;
      border-bottom: 1px solid #ddd;
      margin: 20px 0;
    }
    button {
      background-color: #0366d6;
      color: white;
      border: none;
      padding: 8px 16px;
      font-size: 1em;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background-color: #024b9a;
    }
    form {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <nav>
    {% if user.is_authenticated %}
      Olá, {{ user.username }} |
      <a href="{% url 'logout' %}">Sair</a>
    {% else %}
      <a href="{% url 'login' %}">Entrar</a> |
      <a href="{% url 'register' %}">Registrar</a>
    {% endif %}
  </nav>

  <hr />

  {% block content %}
  {% endblock %}
</body>
</html>
